<!DOCTYPE html>
<html>

<head>
  <title>Käyttäjä {{ user.username }}</title>
</head>

<body>
   <h1>Käyttäjä {{ user.username }}</h1>
   <p>
     Käyttäjä on lukenut yhteensä {{ items | count }} kirjaa.
   </p>
   <h2>Luetut kirjat</h2>
   <ul>
     {% for item in items %}
     <li><a href="/item/{{ item.id }}">{{ item.book_name }}</a></li>
     {% endfor %}
   </ul>
   <p>
     <a href="/">Takaisin</a>
   </p>
</body>

</html>
