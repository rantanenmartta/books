<!DOCTYPE html>
<html>

<head>
   <title>Kommentin muokkaus</title>
</head>

<body>
   <h1>Kommentin muokkaus</h1>
   <form action="/update_comment" method="post">
     <p>
      Kommentti: <br />
      <textarea name="content" rows="8" cols="60" maxlength="3000" required>{{ comment.content }}</textarea>
     </p>
     <input type="hidden" name="comment_id" value="{{ comment.id }}">
     <input type="hidden" name="item_id" value="{{ item.id }}" />
     <input type="submit" value="Päivitä kommentti" />
   </form>
</body>

</html>
