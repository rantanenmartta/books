<!DOCTYPE html>
<html>

<head>
   <title>Etsi kirja</title>
</head>

<body>
   <h1>Etsi kirja</title>
   
   <form action="/find_item" method="get">
     <p>
       Hakusana: <input type="text" name="query" value="{{ query }}">
     </p>
     <input type="submit" value="Etsi">
   </form>

   <p>
    <a href="/">Takaisin</a>
   </p>
  
  {% if query %}
  <h2>Tulokset</h2>
  
  <ul>
    {% for item in results %}
    <li><a href="/item/{{ item.id }}">{{ item.book_name }}</a></li>
    {% endfor %}
  </ul>
  {% endif %}

</body>
</html>
