{% extends "layout.html" %}

{% block title %}Etsi kirja{% endblock %}

{% block content %}
<h2>Etsi kirja</h2>
   
<form action="/find_item" method="get">
  <p>
    <label for="query">Hakusana:</label>
    <input type="text" name="query" id="query" value="{{ query }}">
  </p>
    <input type="submit" value="Etsi">
</form>
  
{% if query %}
<h3>Tulokset</h3>

{% for item in results %}
<div class="user_books">
  <a href="/item/{{ item.id }}">{{ item.book_name }}</a>
  <br />
  Lisännyt: <a href="/user/{{ item.user_id }}">{{ item.username }}</a>
</div>
{% endfor %}
{% endif %}
{% endblock %}
