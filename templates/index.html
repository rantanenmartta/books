<!DOCTYPE html>
<html>

<head>
  <title>Kirjautuminen</title>
</head>

<body>
  <h1>Kirjat</h1>

  {% if session.username %}
  <p>
    Olet kirjautunut nimellä {{ session.username }}, id-numerosi on {{ session.user_id}}
  </p>
  {% endif %}

  <p>
    <a href="/login">Kirjaudu sisään</a>
    <a href="/register">Luo tunnus</a>
    <a href="/logout">Kirjaudu ulos</a>
  </p>
  
  <p>
    <a href="/new_item">Lisää kirja</a>
    <a href="/find_item">Etsi kirja</a>
  </p>
  <h2>Käyttäjien lisäämät kirjat</h2>
    <ul>
     {% for item in items %}
     <li><a href="/item/{{ item.id }}">{{item.book_name}}</a></li>
     {% endfor %}
    </ul>
</body>

</html>
