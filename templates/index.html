{% extends "layout.html" %}

{% block title %}Kirjat{% endblock %}

{% block content %}
<h2>Käyttäjien lisäämät kirjat</h2>

{% for item in items %}
<div class="book">
<a href="/item/{{ item.id }}">{{item.book_name}}</a> <br />
Lisännyt: <a href="/user/{{ item.user_id }}">{{ item.username }}</a> <br />
Kommentteja: {{ item.com_count }}
</div>
{% endfor %}

<p class="page-nav">
  <a href="/{{ page - 1 }}">&lt;&lt;</a>
  Sivu {{ page }}/{{ page_count }}
  <a href="/{{ page + 1 }}">&gt;&gt;</a>
</p>
{% endblock %}
