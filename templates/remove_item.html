{% extends "layout.html" %}

{% block title %}Kirjan poisto{% endblock %}

{% block content %}
<h2>{{ item.book_name }}<h2>
<h3>Kirjan poisto</h3>
<p>Haluatko varmasti poistaa tämän kirjan?</p>
<form action="/remove_item/{{ item.id }}" method="post">
  <input type="hidden" name="csrf_token" value="{{ session.csrf_token }}" />
  <input type="submit" name="remove" value="Poista kirja">
  <input type="submit" name="back" value="Palaa takaisin">
</form>
{% endblock %}
